<!DOCTYPE html>
<html>
<head>
<title>📸 First trip Banaras ❤️</title>
<link rel="stylesheet" href="style.css">

<style>

body{
text-align:center;
background:linear-gradient(135deg,#fef6e4,#ffffff);
font-family:Arial,sans-serif;
padding:20px;
}

.music-card{
background:black;
padding:20px;
border-radius:22px;
width:200px;
margin:auto;
box-shadow:0 0 20px gold;
}

.vinyl{
font-size:60px;
animation:spin 4s linear infinite;
animation-play-state:paused;
}

.vinyl.playing{
animation-play-state:running;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.music-btn{
background:gold;
border:none;
padding:10px 20px;
border-radius:25px;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.slide{
width:200px;
border-radius:22px;
border:3px solid gold;
box-shadow:0 0 20px gold;
display:none;
margin:auto;
}

.caption{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#ff4d6d;
min-height:50px;
}

.btn{
display:inline-block;
padding:10px 20px;
background:gold;
color:black;
text-decoration:none;
border-radius:20px;
font-weight:bold;
margin-top:20px;
}

</style>
</head>

<body>

<h1>📸 Our moments ❤️</h1>

<p>Every picture tells a beautiful story... 💖</p>

<div class="music-card">

<h2>🎵 I always love you like this song 🎵</h2>

<div class="vinyl">💿</div>

<audio id="bgMusic">
<source src="song.ogg" type="audio/ogg">
</audio>

<br><br>

<button class="music-btn" onclick="toggleMusic()">
▶️ Play Song
</button>

<p id="musicStatus">
❤️ Music Waiting For You...
</p>

</div>

<br><br>

<img class="slide" src="photo1.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">
<img class="slide" src="photo1.jpg">

<div class="caption" id="caption">
❤️ The Day You Became My Favorite Person ❤️
</div>

<br>

<p>
✨ Sanjh ❤️ Rishabh ✨
<br>
Forever & Always 💖
</p>

<a href="voice.html" class="btn">
🎙 Continue To Next Surprise
</a>

<script>

let music = document.getElementById("bgMusic");
let vinyl = document.querySelector(".vinyl");

function toggleMusic(){

if(music.paused){

music.play();
vinyl.classList.add("playing");

document.querySelector(".music-btn").innerHTML =
"⏸ Pause Song";

document.getElementById("musicStatus").innerHTML =
"💖 Playing Love Song...";

}else{

music.pause();
vinyl.classList.remove("playing");

document.querySelector(".music-btn").innerHTML =
"▶️ Play Song";

document.getElementById("musicStatus").innerHTML =
"❤️ Music Paused";

}

}

let slides = document.querySelectorAll(".slide");

let captions = [

"❤️ The Day You Became My Favorite Person ❤️",

"🥰 Every Moment With You Is Special",

"💖 My Heart Smiles Because Of You",

"✨ Forever Starts With You ❤️"

];

let current = 0;

function showSlides(){

slides.forEach(slide=>{
slide.style.display="none";
});

slides[current].style.display="block";

document.getElementById("caption").innerHTML =
captions[current];

current++;

if(current >= slides.length){
current = 0;
}

}

showSlides();

setInterval(showSlides,4000);

</script>

</body>
</html>
