<!DOCTYPE html>
<html>
<head>
<title>📸 First trip Banaras ❤️</title>
<link rel="stylesheet" href="style.css">

<style>

body{
text-align:center;
background:linear-gradient(
135deg,
#ffe5ec,
#fff0d9,
#e0f7ff
);
font-family:Arial,sans-serif;
padding:20px;
}

.music-card{
width:700px;
max-width:90%;
margin:30px auto;
padding:25px;
background:white;
border-radius:50px;
box-shadow:0 0 25px rgba(255,215,0,.5);
}

.music-card h2{
color:#ff4d88;
margin-bottom:20px;
}

.player{
display:flex;
align-items:center;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.music-btn{
background:linear-gradient(45deg,gold,#ffcc00);
border:none;
padding:15px 25px;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.music-btn:hover{
transform:scale(1.05);
}

.vinyl{
font-size:60px;
animation:spin 4s linear infinite;
animation-play-state:paused;
}

.vinyl.playing{
animation-play-state:running;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

#musicStatus{
color:#ff4d88;
font-weight:bold;
}


</style>
</head>

<body>

<h1>📸 Our moments ❤️</h1>

<p>Every picture tells a beautiful story... 💖</p>

<div class="music-card">

<h2>🎵 I always love you like this song 🎵</h2>

<div class="music-card">

<h2>🎵 Special Song For You ❤️</h2>

<div class="player">

<div class="vinyl">💿</div>

<button class="music-btn" onclick="toggleMusic()">
▶️ Play Song
</button>

<p id="musicStatus">
❤️ Music Waiting...
</p>

</div>

<audio id="bgMusic">
<source src="song.ogg" type="audio/ogg">
</audio>

</div>
<br><br>

<div class="slideshow">

<img class="slide" src="photo1.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">

</div>

<div class="caption" id="caption">
❤️ The Day You Became My Favorite Person ❤️
</div>

<br>

<p>
✨ Sanjh ❤️ Rishabh ✨
<br>
Forever & Always 💖
</p>

<a href="voice.html" class="btn">
🎙 Continue To Next Surprise
</a>

<script>

let music = document.getElementById("bgMusic");
let vinyl = document.querySelector(".vinyl");

function toggleMusic(){

if(music.paused){

music.play();
vinyl.classList.add("playing");

document.querySelector(".music-btn").innerHTML =
"⏸ Pause Song";

document.getElementById("musicStatus").innerHTML =
"💖 Playing Love Song...";

}else{

music.pause();
vinyl.classList.remove("playing");

document.querySelector(".music-btn").innerHTML =
"▶️ Play Song";

document.getElementById("musicStatus").innerHTML =
"❤️ Music Paused";

}

}

let slides = document.querySelectorAll(".slide");

let captions = [

"❤️ The Day You Became My Favorite Person ❤️",

"🥰 Every Moment With You Is Special",

"💖 My Heart Smiles Because Of You",

"✨ Forever Starts With You ❤️"

];

let current = 0;

function showSlides(){

slides.forEach(slide=>{
slide.style.display="none";
});

slides[current].style.display="block";

document.getElementById("caption").innerHTML =
captions[current];

current++;

if(current >= slides.length){
current = 0;
}

}

showSlides();

setInterval(showSlides,4000);

</script>

</body>
</html>
