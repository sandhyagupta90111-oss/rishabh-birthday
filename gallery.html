<!DOCTYPE html>
<html>

<head>
<title>📸 Our Love Story ❤️</title>
<link rel="stylesheet" href="style.css">

<style>
.slideshow img{
width:320px;
border-radius:20px;
box-shadow:0 0 20px gold;
display:none;
margin:auto;
}

.caption{
font-size:22px;
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>📸 Our Love Story ❤️</h1>

<p>
Every picture tells a beautiful story... 💖
</p>

<h3>🎵 Play Our Special Song ❤️</h3>

<audio controls loop>
<source src="song.ogg" type="audio/ogg">
Your browser does not support audio.
</audio>

<br><br>

<div class="slideshow">

<img class="slide" src="photo1.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">
<img class="slide" src="photo1.jpg">

</div>

<div class="caption" id="caption">
❤️ The Day You Became My Favorite Person ❤️
</div>

<br><br>

<a href="voice.html" class="btn">
🎙 Continue
</a>

</div>

<script>

let slides = document.querySelectorAll(".slide");

let captions = [
"❤️ The Day You Became My Favorite Person ❤️",
"🥰 Every Moment With You Is Special",
"💖 My Heart Smiles Because Of You",
"✨ Forever Starts With You"
];

let current = 0;

function showSlides(){

slides.forEach(slide=>{
slide.style.display="none";
});

slides[current].style.display="block";

document.getElementById("caption").innerHTML =
captions[current];

current++;

if(current >= slides.length){
current = 0;
}

}

showSlides();

setInterval(showSlides,4000);

</script>

</body>
</html>
