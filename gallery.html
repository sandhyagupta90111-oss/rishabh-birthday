<!DOCTYPE html>
<html>
<head>
<title>📸 Our Love Story ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

body{
text-align:center;
background:linear-gradient(135deg,#e6f7ff,#ffffff);
font-family:Arial,sans-serif;
}

.container{
padding:20px;
}

h1{
color:#ff4d6d;
}

.slideshow{
margin-top:20px;
}

.slide{
width:320px;
height:auto;
border-radius:25px;
border:5px solid gold;
box-shadow:0 0 25px gold;
display:none;
}

.caption{
margin-top:20px;
font-size:24px;
font-weight:bold;
color:#ff4d6d;
min-height:60px;
}

audio{
margin-top:20px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:gold;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
margin-top:25px;
}

.btn:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="container">

<h1>📸 Our Love Story ❤️</h1>

<p>
Every picture tells a beautiful story... 💖
</p>

<h3>🎵 Our Special Song 🎵</h3>

<audio id="bgMusic" controls loop>
<source src="song.ogg" type="audio/ogg">
</audio>

<br><br>

<button class="btn"
onclick="document.getElementById('bgMusic').play()">
💖 Start Our Song
</button>

<div class="slideshow">

<br>

<img class="slide" src="photo1.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">
<img class="slide" src="photo1.jpg">

</div>

<div class="caption" id="caption">
❤️ The Day You Became My Favorite Person ❤️
</div>

<br>

<p>
✨ Sandhya & Rishabh ✨
<br>
❤️ Together Forever ❤️
</p>

<br>

<a href="voice.html" class="btn">
🎙 Continue To Next Surprise
</a>

</div>

<script>

let slides = document.querySelectorAll(".slide");

let captions = [

"❤️ The Day You Became My Favorite Person ❤️",

"🥰 Every Moment With You Is Special",

"💖 My Heart Smiles Because Of You",

"✨ Forever Starts With You ❤️"

];

let current = 0;

function showSlides(){

slides.forEach(slide=>{
slide.style.display="none";
});

slides[current].style.display="block";

document.getElementById("caption").innerHTML =
captions[current];

current++;

if(current >= slides.length){
current = 0;
}

}

showSlides();

setInterval(showSlides,4000);

</script>

</body>
</html>
