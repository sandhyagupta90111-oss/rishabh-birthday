<!DOCTYPE html>
<html>
<head>
<title>📸 First trip Banaras ❤️</title>

<style>

body{
text-align:center;
background:linear-gradient(
135deg,
#ffe5ec,
#fff0d9,
#e0f7ff
);
font-family:Arial,sans-serif;
padding:20px;
margin:0;
}

h1{
color:#ff4d88;
}

.music-card{
width:90%;
max-width:650px;
margin:30px auto;
padding:25px;
background:white;
border-radius:40px;
box-shadow:0 0 25px rgba(255,215,0,.5);
}

.music-card h2{
color:#ff4d88;
}

.player{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.vinyl{
font-size:70px;
animation:spin 4s linear infinite;
animation-play-state:paused;
}

.vinyl.playing{
animation-play-state:running;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.music-btn{
background:linear-gradient(45deg,gold,#ffcc00);
border:none;
padding:15px 25px;
border-radius:40px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#musicStatus{
color:#ff4d88;
font-weight:bold;
}

.slideshow{
display:flex;
justify-content:center;
align-items:center;
margin:30px auto;
min-height:450px;
}

.slide{
display:none;
width:320px;
height:420px;
object-fit:cover;
border-radius:25px;
border:5px solid gold;
box-shadow:0 0 25px gold;
}

.caption{
margin-top:20px;
font-size:22px;
font-weight:bold;
color:#ff4d88;
min-height:60px;
}

.btn{
display:inline-block;
padding:15px 30px;
background:gold;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:bold;
box-shadow:0 0 15px gold;
margin-top:20px;
}

@media(max-width:600px){

.slide{
width:260px;
height:340px;
}

.music-card{
width:95%;
}

}

</style>
</head>

<body>

<h1>📸 Our moments ❤️</h1>

<p>Every picture tells a beautiful story... 💖</p>

<div class="music-card">

<h2>🎵 I always love you like this song 🎵</h2>

<div class="player">

<div class="vinyl">💿</div>

<button class="music-btn" onclick="toggleMusic()">
▶️ Play Song
</button>

<p id="musicStatus">
❤️ Music Waiting...
</p>

</div>

<audio id="bgMusic">
<source src="song.ogg" type="audio/ogg">
</audio>

</div>

<div class="slideshow">

<img class="slide" src="photo1.jpg">
<img class="slide" src="photo3.jpg">
<img class="slide" src="photo4.jpg">

</div>

<div class="caption" id="caption">
❤️ The Day You Became My Favorite Person ❤️
</div>

<p>
✨ Sanjh ❤️ Rishabh ✨
<br>
Forever & Always 💖
</p>

<a href="voice.html" class="btn">
🎙 Continue To Next Surprise
</a>

<script>

let music = document.getElementById("bgMusic");
let vinyl = document.querySelector(".vinyl");

function toggleMusic(){

if(music.paused){

music.play();
vinyl.classList.add("playing");

document.querySelector(".music-btn").innerHTML =
"⏸ Pause Song";

document.getElementById("musicStatus").innerHTML =
"💖 Playing Love Song...";

}else{

music.pause();
vinyl.classList.remove("playing");

document.querySelector(".music-btn").innerHTML =
"▶️ Play Song";

document.getElementById("musicStatus").innerHTML =
"❤️ Music Paused";

}

}

let slides = document.querySelectorAll(".slide");

let captions = [

"❤️ The Day You Became My Favorite Person ❤️",
"🥰 Every Moment With You Is Special",
"💖 My Heart Smiles Because Of You",
"✨ Forever Starts With You ❤️"

];

let current = 0;

function showSlides(){

slides.forEach(slide=>{
slide.style.display="none";
});

slides[current].style.display="block";

document.getElementById("caption").innerHTML =
captions[current];

current++;

if(current >= slides.length){
current = 0;
}

}

showSlides();

setInterval(showSlides,4000);

</script>

</body>
</html>
